pre-commit:
  parallel: true
  commands:
    biome-format:
      glob: "**/*.{ts,tsx,mjs,json,jsonc,css}"
      run: pnpm biome format --write {staged_files}
      stage_fixed: true

    oxlint:
      glob: "*.{ts,tsx,mjs}"
      run: pnpm oxlint --fix {staged_files}
      stage_fixed: true

    component-size:
      glob: "src/{components,features}/**/*.tsx"
      run: bash scripts/check-component-size.sh {staged_files}

    test-exists:
      glob: "src/{components,features}/**/*.tsx"
      run: bash scripts/check-test-exists.sh {staged_files}
