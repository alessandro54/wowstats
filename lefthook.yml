pre-commit:
  parallel: true
  commands:
    biome-format:
      glob: "**/*.{ts,tsx,mjs,json,jsonc,css}"
      run: biome format --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

    oxlint:
      glob: "*.{ts,tsx,mjs}"
      run: oxlint --fix {staged_files}
      stage_fixed: true

    stylelint:
      glob: "*.css"
      run: stylelint --fix {staged_files}
      stage_fixed: true
